[Distribution]
Distribution=opensuse
Release=tumbleweed

[Output]
Format=disk
ImageId=rootfs
Output=rootfs
OutputDirectory=mkosi.output

[Content]
Locale=C.UTF-8
Timezone=UTC
Hostname=schedctl-test
Packages=
        shadow
        kmod
        pam
        systemd-network
        openssh-server
        openssh-clients
        ca-certificates
        ca-certificates-mozilla
        containerd
        nerdctl
        podman
        cni-plugins
        iptables
PostInstallationScripts=mkosi.postinst.chroot
